<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bingo Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-family: 'Bangers', cursive; font-size: 3.5rem; letter-spacing: 4px; line-height: 1; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .controls { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 1.5rem; background: #fff; border: 1px solid #e0ddd5; border-radius: 12px; padding: 1.25rem; }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
  .ctrl-group.wide { flex: 3; min-width: 220px; }
  label { font-size: 12px; font-weight: 500; color: #555; }
  textarea { width: 100%; height: 110px; resize: vertical; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafaf8; color: #1a1a1a; line-height: 1.5; }
  textarea:focus { outline: none; border-color: #999; }
  select, input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #fafaf8; color: #1a1a1a; }
  select:focus, input[type="text"]:focus { outline: none; border-color: #999; }
  .word-count { font-size: 12px; color: #888; }
  .word-count.warn { color: #c0392b; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .btn-primary { background: #1a1a1a; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #333; }
  .btn-sec { background: #fff; border: 1px solid #ccc; padding: 10px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a1a1a; cursor: pointer; }
  .btn-sec:hover { background: #f0efeb; }
  .error-msg { font-size: 13px; color: #c0392b; margin-bottom: 1rem; padding: 10px 14px; background: #fdf0ef; border-radius: 8px; border: 1px solid #f5c6c2; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
  .bingo-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
  .card-header { display: grid; grid-template-columns: repeat(5, 1fr); background: #1a1a1a; }
  .card-header span { font-family: 'Bangers', cursive; font-size: 1.7rem; letter-spacing: 2px; color: #fff; text-align: center; padding: 8px 4px; }
  .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #e0ddd5; }
  .bingo-cell { background: #fff; padding: 8px 4px; text-align: center; font-size: 11px; min-height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.12s; line-height: 1.3; color: #1a1a1a; user-select: none; }
  .bingo-cell:hover { background: #f5f4f0; }
  .bingo-cell.marked { background: #1a1a1a; color: #fff; font-weight: 500; }
  .bingo-cell.free { background: #e8f4fd; color: #1a6fa8; font-weight: 500; font-size: 10px; cursor: default; }
  .card-footer { font-size: 11px; color: #999; text-align: right; padding: 6px 12px; border-top: 1px solid #eee; }
  .print-hint { font-size: 12px; color: #888; margin-top: 1.5rem; }

  @media print {
    body { background: #fff; padding: 0; }
    .controls, .btn-row, h1, .subtitle, .print-hint, .error-msg { display: none !important; }
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .bingo-cell.marked { background: #fff !important; color: #1a1a1a !important; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>BINGO</h1>
  <p class="subtitle">Enter your words, pick how many cards, and generate randomized bingo cards.</p>

  <div class="controls">
    <div class="ctrl-group wide">
      <label>Words / phrases — one per line (need at least 24 for free space, 25 without)</label>
      <textarea id="wordInput" placeholder="Cat&#10;Dog&#10;House&#10;Tree&#10;Sun&#10;Moon&#10;..."></textarea>
      <span class="word-count" id="wordCount">0 words entered</span>
    </div>
    <div class="ctrl-group">
      <label>Number of cards</label>
      <select id="numCards">
        <option>1</option><option>2</option><option selected>4</option>
        <option>6</option><option>8</option><option>10</option>
        <option>16</option><option>24</option><option>30</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Free space</label>
      <select id="freeSpace">
        <option value="yes">Yes — center free space</option>
        <option value="no">No free space</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Card title (first 5 letters used as columns)</label>
      <input type="text" id="cardTitle" value="BINGO" maxlength="20" />
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generateCards()">&#x21BA; Generate cards</button>
    <button class="btn-sec" onclick="window.print()">&#x1F5A8; Print</button>
    <button class="btn-sec" onclick="clearMarks()">&#x2715; Clear marks</button>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div class="cards-grid" id="cardsGrid"></div>
  <p class="print-hint" id="printHint" style="display:none">&#x2139;&#xFE0F; Tip: click any cell to mark it during play. Use Print to get physical copies. Each card is randomly shuffled.</p>
</div>

<script>
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  document.getElementById('wordInput').addEventListener('input', updateCount);

  function updateCount() {
    const words = getWords();
    const el = document.getElementById('wordCount');
    el.textContent = words.length + ' words entered';
    el.className = 'word-count' + (words.length > 0 && words.length < 24 ? ' warn' : '');
  }

  function getWords() {
    return document.getElementById('wordInput').value
      .split('\n')
      .map(w => w.trim())
      .filter(w => w.length > 0);
  }

  function generateCards() {
    const words = getWords();
    const numCards = parseInt(document.getElementById('numCards').value);
    const freeSpace = document.getElementById('freeSpace').value === 'yes';
    const titleRaw = document.getElementById('cardTitle').value.trim() || 'BINGO';
    const title = titleRaw.toUpperCase();
    const letters = title.length >= 5 ? title.substring(0, 5).split('') : ['B','I','N','G','O'];
    const errorEl = document.getElementById('errorMsg');
    const needed = freeSpace ? 24 : 25;

    if (words.length < needed) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'You need at least ' + needed + ' words. You currently have ' + words.length + '.';
      return;
    }
    errorEl.style.display = 'none';

    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';

    const today = new Date().toLocaleDateString();

    for (let c = 0; c < numCards; c++) {
      const picked = shuffle(words).slice(0, needed);
      const cells = freeSpace
        ? [...picked.slice(0, 12), 'FREE SPACE', ...picked.slice(12)]
        : picked;

      const card = document.createElement('div');
      card.className = 'bingo-card';

      const header = document.createElement('div');
      header.className = 'card-header';
      letters.forEach(l => {
        const s = document.createElement('span');
        s.textContent = l;
        header.appendChild(s);
      });
      card.appendChild(header);

      const bingoGrid = document.createElement('div');
      bingoGrid.className = 'bingo-grid';

      cells.forEach(txt => {
        const cell = document.createElement('div');
        const isFree = txt === 'FREE SPACE';
        cell.className = 'bingo-cell' + (isFree ? ' free' : '');
        cell.textContent = txt;
        if (!isFree) {
          cell.addEventListener('click', () => cell.classList.toggle('marked'));
        }
        bingoGrid.appendChild(cell);
      });

      card.appendChild(bingoGrid);

      const footer = document.createElement('div');
      footer.className = 'card-footer';
      footer.textContent = 'Card #' + (c + 1) + ' · ' + today;
      card.appendChild(footer);

      grid.appendChild(card);
    }

    document.getElementById('printHint').style.display = 'block';
    document.getElementById('cardsGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function clearMarks() {
    document.querySelectorAll('.bingo-cell.marked').forEach(c => c.classList.remove('marked'));
  }
</script>
</body>
</html>
